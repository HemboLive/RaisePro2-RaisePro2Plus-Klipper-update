# ==============================================================
#  macros.cfg - Werkzeugwechsel, Kopf-Servo, Filamentsensoren,
#              Start-/Idle-Verhalten. Von printer.cfg inkludiert.
# ==============================================================



[gcode_macro M405]
description: Filamentsensoren aktivieren
gcode = 
	SAVE_VARIABLE VARIABLE=filament_sensor_enabled VALUE=1
	SET_FILAMENT_SENSOR SENSOR=F0 ENABLE=1
	SET_FILAMENT_SENSOR SENSOR=F1 ENABLE=1


[gcode_macro M406]
description: Filamentsensoren deaktivieren
gcode = 
	SAVE_VARIABLE VARIABLE=filament_sensor_enabled VALUE=0
	SET_FILAMENT_SENSOR SENSOR=F0 ENABLE=0
	SET_FILAMENT_SENSOR SENSOR=F1 ENABLE=0


# ---- Treiberstrom-Referenz (PWM-Vref) fuer die Onboard-Extruder-Treiber ---
# Aktiver Extruder braucht run_current; der geparkte kann reduziert werden
# (spart Waerme). Wird NUR beim Werkzeugwechsel gesetzt, nie am aktiven Tool
# waehrend des Drucks -> keine Schrittverluste. Bei Schlupf idle_current -> 0.3.
[gcode_macro _TOOL_SETTINGS]
description: Treiberstrom-Referenz + T1-Duesenversatz (zentrale Stellschrauben)
variable_run_current: 0.3
variable_idle_current: 0.15
# --- T1-Duesenversatz relativ zu T0 (HIER zentral pflegen) ---
# Genutzt fuer Werkzeugwechsel UND CHECK_PRINT_AREA / SHOW_PRINT_LIMITS.
variable_t1_offset_x: -25.0
variable_t1_offset_y: 0.0
variable_t1_offset_z: 0.27
gcode:


# ---- Werkzeug-/Kopf-Steuerung --------------------------------------------
# Servo/Aktor an PB14 hebt den inaktiven Kopf an.
#   VALUE=1 -> Kopf 0 unten,  VALUE=0 -> Kopf 1 unten.
# Open-loop -> bewusst mit Wartezeit (dwell_ms). Wird bei JEDER Werkzeugwahl
# neu gesetzt, auch wenn das Tool schon aktiv ist.
[gcode_macro _HEAD_DOWN]
description: Kopf-Servo in die Position fuer Tool 0/1 bringen
variable_dwell_ms: 700
gcode:
    {% set t = params.TOOL|int %}
    M400
    {% if t == 0 %}
        SET_PIN PIN=head_lift VALUE=1
    {% else %}
        SET_PIN PIN=head_lift VALUE=0
    {% endif %}
    G4 P{printer['gcode_macro _HEAD_DOWN'].dwell_ms}


# Werkzeugwahl: Servo IMMER neu setzen; Extruder/Offset/Strom/Sensor nur bei
# echtem Wechsel (oder FORCE=1). So wird bei erneuter Ansprache des gleichen
# Tools der Kopf trotzdem sauber nach unten gefahren, ohne den Offset erneut
# anzuwenden.
[gcode_macro _SELECT_TOOL]
description: Interne Werkzeugwahl. Parameter: T=0|1  [FORCE=0|1]
gcode:
    {% set t = params.T|int %}
    {% set force = params.FORCE|default(0)|int %}
    {% set svv = printer.save_variables.variables %}
    {% set target = 'extruder' if t == 0 else 'extruder1' %}
    {% set changed = (force == 1) or (printer.toolhead.extruder != target) %}
    G1 F21000
    _HEAD_DOWN TOOL={t}
    {% if changed %}
        ACTIVATE_EXTRUDER EXTRUDER={target}
        SAVE_VARIABLE VARIABLE=currentextruder VALUE='"{target}"'
        {% set ts = printer['gcode_macro _TOOL_SETTINGS'] %}
        {% set rc = ts.run_current %}
        {% set ic = ts.idle_current %}
        {% if t == 0 %}
            SET_GCODE_OFFSET Z=0 X=0 Y=0 MOVE=0
            SET_FAN_SPEED FAN=current_E0 SPEED={rc}
            SET_FAN_SPEED FAN=current_E1 SPEED={ic}
        {% else %}
            SET_GCODE_OFFSET Z={ts.t1_offset_z} X={ts.t1_offset_x} Y={ts.t1_offset_y} MOVE=0
            SET_FAN_SPEED FAN=current_E1 SPEED={rc}
            SET_FAN_SPEED FAN=current_E0 SPEED={ic}
        {% endif %}
        {% if svv.filament_sensor_enabled|int != 0 %}
            {% if t == 0 %}
                SET_FILAMENT_SENSOR SENSOR=F1 ENABLE=0
                SET_FILAMENT_SENSOR SENSOR=F0 ENABLE=1
            {% else %}
                SET_FILAMENT_SENSOR SENSOR=F1 ENABLE=1
                SET_FILAMENT_SENSOR SENSOR=F0 ENABLE=0
            {% endif %}
        {% endif %}
    {% endif %}


[gcode_macro T0]
description: Werkzeug 0 (Extruder 0) waehlen
gcode:
    _SELECT_TOOL T=0


[gcode_macro T1]
description: Werkzeug 1 (Extruder 1) waehlen
gcode:
    _SELECT_TOOL T=1


# Standard-Klipper-Name (frueher START_GCODE). Wird vom Slicer am Startende aufgerufen.
# Sichert Werkzeug/Kopf/Strom und prueft optional den Druckbereich (wenn MINX.. uebergeben).
[gcode_macro PRINT_START]
description: Druckstart-Hook (Werkzeug/Kopf sichern, optional Druckbereich pruefen)
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set t = 1 if svv.currentextruder == 'extruder1' else 0 %}
    {% if params.MINX is defined and params.MAXX is defined and params.MINY is defined and params.MAXY is defined %}
        CHECK_PRINT_AREA MINX={params.MINX} MAXX={params.MAXX} MINY={params.MINY} MAXY={params.MAXY} TOOL={t}
    {% endif %}
    {% if printer.toolhead.extruder != svv.currentextruder %}
        ACTIVATE_EXTRUDER EXTRUDER={svv.currentextruder}
    {% endif %}
    SET_FAN_SPEED FAN=current_E{t} SPEED={printer['gcode_macro _TOOL_SETTINGS'].run_current}
    _HEAD_DOWN TOOL={t}


# Standard-Klipper-Name. Wird vom Slicer am Ende aufgerufen (nach Abkuehlen/Parken).
[gcode_macro PRINT_END]
description: Druckende-Hook (Heizungen/Luefter/Motoren aus, LED fertig)
gcode:
    TURN_OFF_HEATERS
    M107                                   ; Teilekuehlung aus
    SET_FAN_SPEED FAN=current_E0 SPEED=0    ; Extruder-Treiberstrom aus (Ruhe)
    SET_FAN_SPEED FAN=current_E1 SPEED=0
    M84                                    ; Motoren aus


# ---- Druckbereichs-Sicherung (Duesenversatz) -----------------------------
# Kopfposition = Gcode + Offset. Bei T1 (Offset X<0) ist der linke Rand
# unerreichbar. CHECK_PRINT_AREA prueft die Bounding-Box VOR dem Druck.
[gcode_macro CHECK_PRINT_AREA]
description: Vorab-Pruefung Druckbereich vs. Duesenversatz. Params: MINX MAXX MINY MAXY [TOOL=0|1]
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set dflt = 1 if svv.currentextruder == 'extruder1' else 0 %}
    {% set t = params.TOOL|default(dflt)|int %}
    {% set ts = printer['gcode_macro _TOOL_SETTINGS'] %}
    {% set ox = ts.t1_offset_x if t == 1 else 0.0 %}
    {% set oy = ts.t1_offset_y if t == 1 else 0.0 %}
    {% set amin = printer.toolhead.axis_minimum %}
    {% set amax = printer.toolhead.axis_maximum %}
    {% set cx0 = params.MINX|float + ox %}
    {% set cx1 = params.MAXX|float + ox %}
    {% set cy0 = params.MINY|float + oy %}
    {% set cy1 = params.MAXY|float + oy %}
    {% set bad = [] %}
    {% if cx0 < amin.x %}{% set _ = bad.append("X links %.1fmm zu weit (Kopf->%.1f, min %.1f)" % (amin.x - cx0, cx0, amin.x)) %}{% endif %}
    {% if cx1 > amax.x %}{% set _ = bad.append("X rechts %.1fmm zu weit (Kopf->%.1f, max %.1f)" % (cx1 - amax.x, cx1, amax.x)) %}{% endif %}
    {% if cy0 < amin.y %}{% set _ = bad.append("Y vorne %.1fmm zu weit (Kopf->%.1f, min %.1f)" % (amin.y - cy0, cy0, amin.y)) %}{% endif %}
    {% if cy1 > amax.y %}{% set _ = bad.append("Y hinten %.1fmm zu weit (Kopf->%.1f, max %.1f)" % (cy1 - amax.y, cy1, amax.y)) %}{% endif %}
    {% if bad %}
        { action_raise_error("ABBRUCH vor Druck - T%d Versatz(X=%.1f Y=%.1f): %s . Druckbereich verkleinern oder Tool wechseln. Grenzen: SHOW_PRINT_LIMITS." % (t, ox, oy, ' | '.join(bad))) }
    {% else %}
        { action_respond_info("CHECK_PRINT_AREA OK fuer T%d (Versatz X=%.1f Y=%.1f)." % (t, ox, oy)) }
    {% endif %}


[gcode_macro SHOW_PRINT_LIMITS]
description: Zeigt erreichbaren Druckbereich je Duese + gemeinsam (Versatz + Achsgrenzen)
gcode:
    {% set ts = printer['gcode_macro _TOOL_SETTINGS'] %}
    {% set amin = printer.toolhead.axis_minimum %}
    {% set amax = printer.toolhead.axis_maximum %}
    {% set ox = ts.t1_offset_x %}
    {% set oy = ts.t1_offset_y %}
    {% set t1x0 = [amin.x, amin.x - ox]|max %}
    {% set t1x1 = [amax.x, amax.x - ox]|min %}
    {% set t1y0 = [amin.y, amin.y - oy]|max %}
    {% set t1y1 = [amax.y, amax.y - oy]|min %}
    { action_respond_info("Erreichbarer Druckbereich (Gcode-Koordinaten):") }
    { action_respond_info("T0: X %.1f..%.1f  Y %.1f..%.1f" % (amin.x, amax.x, amin.y, amax.y)) }
    { action_respond_info("T1: X %.1f..%.1f  Y %.1f..%.1f  (Versatz X=%.1f Y=%.1f)" % (t1x0, t1x1, t1y0, t1y1, ox, oy)) }
    { action_respond_info("GEMEINSAM (beide): X %.1f..%.1f  Y %.1f..%.1f  = %.0f x %.0f mm" % (t1x0, t1x1, t1y0, t1y1, t1x1 - t1x0, t1y1 - t1y0)) }


[gcode_macro M33]
gcode = 
	SDCARD_RESET_FILE


[delayed_gcode startup_macro]
initial_duration: 1
gcode:
    _SELECT_TOOL T=0 FORCE=1
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=80





# Auto-Vorheizen (Bett 80C beim Start) nach 2h beenden - aber NUR wenn nicht gedruckt wird.
# Laeuft ein Druck, wird alle 30min erneut geprueft, statt abzuschalten.
[delayed_gcode preheat_timeout]
initial_duration: 7200
gcode:
    {% if printer.print_stats.state in ['printing','paused'] %}
        UPDATE_DELAYED_GCODE ID=preheat_timeout DURATION=1800
    {% else %}
        SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0
    {% endif %}



